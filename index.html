  <body class="antialiased">
    <script>
      // Restore theme and system color scheme before React mounts to prevent flash.
      try {
        var tc = localStorage.getItem('dist-theme-class');
        if (tc) document.body.className = tc + ' antialiased';
        var previewScheme = /^(localhost|127\.0\.0\.1)$/.test(location.hostname)
          ? new URLSearchParams(location.search).get('preview_color_scheme')
          : '';
        var systemScheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        var colorScheme = /^(dark|light)$/.test(previewScheme) ? previewScheme : systemScheme;
        document.documentElement.dataset.colorScheme = colorScheme;
        var themeColor = document.querySelector('meta[name="theme-color"]');
        if (themeColor) themeColor.content = colorScheme === 'dark' ? '#15110F' : '#FAF6F1';
      } catch(e) {}
    </script>
